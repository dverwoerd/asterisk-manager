# ============================================================
# Apache Virtual Host Configuration
# /etc/apache2/sites-available/asterisk-manager.conf
# ============================================================

<VirtualHost *:80>
    ServerName pbx.example.com
    DocumentRoot /var/www/asterisk-manager

    <Directory /var/www/asterisk-manager>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Protect sensitive files
    <FilesMatch "\.(sql|log|bak\..*)$">
        Require all denied
    </FilesMatch>

    # Security headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/asterisk-manager-error.log
    CustomLog ${APACHE_LOG_DIR}/asterisk-manager-access.log combined
</VirtualHost>

# HTTPS (recommended for production):
# <VirtualHost *:443>
#     ServerName pbx.example.com
#     DocumentRoot /var/www/asterisk-manager
#     SSLEngine on
#     SSLCertificateFile /etc/letsencrypt/live/pbx.example.com/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/pbx.example.com/privkey.pem
#     ...
# </VirtualHost>
